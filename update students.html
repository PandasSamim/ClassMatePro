<body class="bg-background text-on-background min-h-screen pb-24">
<!-- TopAppBar -->
<header class="bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 flex items-center w-full px-4 h-16 sticky top-0 z-40">
<button class="mr-4 text-on-surface hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors p-2 rounded-full active:opacity-70 transition-opacity">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-lexend tracking-tight font-headline-md text-headline-md text-gray-900 dark:text-white flex-1">Update Fees</h1>
</header>
<main class="max-w-4xl mx-auto px-4 py-md lg:py-lg grid grid-cols-1 md:grid-cols-12 gap-gutter">
<!-- Student Context Area -->
<div class="md:col-span-12 mb-sm flex items-center gap-4">
<img alt="Sarah Jenkins" class="w-16 h-16 rounded-full object-cover border border-outline-variant shadow-sm" data-alt="A professional headshot of a young female student, Sarah Jenkins, smiling slightly. The background is a soft, blurred light gray, fitting a modern academic portal aesthetic. The lighting is bright and even, highlighting a corporate but approachable mood." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBD2C8l2AG9kBsFCyVhJXD4VfDRGxDPA35Y7EIf_UUoot7qU2Foc0R_e6OruKLipU-yQZLbA2aoibQRM6kvVfTlxaKiXE_xc2PBvm2RgR22ykNIbbPzzd_Zmd8E5eK-hwzlNg4qVtjdCCa3vy3U5LeGxGSH9IPmp3SNj5iASbR86d931G_SdvICRpoYgpkzcNOfg8Hj_tkrtPeS70EKf4Aak6RZ7WZjwAofyIqv7eiwnMcCxHks3QbPAqzJhCmd64wiBrfFNNdO-mY"/>
<div>
<h2 class="font-headline-lg text-headline-lg text-on-surface m-0 p-0">Sarah Jenkins</h2>
<p class="font-body-md text-body-md text-on-surface-variant m-0 p-0 flex items-center gap-2">
<span class="material-symbols-outlined text-[18px]">school</span> Grade 10 - Science Stream
                </p>
</div>
</div>
<!-- Current Fee Card -->
<div class="md:col-span-4 bg-surface-container-lowest rounded-xl p-md border border-outline-variant shadow-[0_4px_12px_rgba(0,0,0,0.04)] h-full flex flex-col justify-center">
<h3 class="font-label-md text-label-md text-on-surface-variant uppercase mb-2">Current Monthly Fee</h3>
<div class="flex items-baseline gap-2">
<span class="font-headline-xl text-headline-xl text-primary">$450.00</span>
<span class="font-body-sm text-body-sm text-on-surface-variant">/ month</span>
</div>
<div class="mt-4 pt-4 border-t border-surface-variant">
<p class="font-body-sm text-body-sm text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-secondary text-[16px]">check_circle</span> Active Billing
                </p>
</div>
</div>
<!-- Adjustment Form Area -->
<div class="md:col-span-8 bg-surface-container-lowest rounded-xl p-md border border-outline-variant shadow-[0_4px_12px_rgba(0,0,0,0.04)]">
<h3 class="font-headline-md text-headline-md text-on-surface mb-md">Fee Adjustment</h3>
<div class="space-y-6">
<!-- New Amount Input -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-2" for="new_amount">Enter New Amount</label>
<div class="relative">
<span class="absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant font-body-lg">$</span>
<input class="w-full bg-surface-container-low border-b-2 border-outline-variant focus:border-primary focus:ring-0 pl-8 pr-4 py-3 rounded-t-DEFAULT font-body-lg text-body-lg text-on-surface transition-colors placeholder-outline" id="new_amount" placeholder="0.00" type="number"/>
</div>
</div>
<!-- Fee Rules & Waivers -->
<div class="pt-sm border-t border-surface-variant">
<h4 class="font-label-md text-label-md text-on-surface-variant uppercase mb-4">Fee Rules &amp; Waivers</h4>
<label class="flex items-center gap-3 cursor-pointer group mb-4">
<div class="relative flex items-center justify-center w-5 h-5 rounded border border-outline-variant bg-surface-container-lowest group-hover:border-primary transition-colors">
<input class="peer sr-only" type="checkbox"/>
<span class="material-symbols-outlined icon-fill text-[16px] text-primary opacity-0 peer-checked:opacity-100 transition-opacity absolute">check</span>
</div>
<span class="font-body-md text-body-md text-on-surface">Apply Low Attendance Waiver (-10%)</span>
</label>
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-2" for="special_notes">Special Notes</label>
<textarea class="w-full bg-surface-container-low border-b-2 border-outline-variant focus:border-primary focus:ring-0 px-4 py-3 rounded-t-DEFAULT font-body-sm text-body-sm text-on-surface transition-colors placeholder-outline resize-none" id="special_notes" placeholder="Reason for adjustment..." rows="3"></textarea>
</div>
</div>
</div>
</div>
<!-- Summary Section -->
<div class="md:col-span-12 bg-surface-container-low rounded-xl p-md border border-outline-variant mt-sm flex flex-col md:flex-row md:items-center justify-between gap-4">
<div>
<h4 class="font-label-sm text-label-sm text-on-surface-variant uppercase mb-1">Effective From</h4>
<p class="font-body-md text-body-md text-on-surface font-semibold">Next Billing Cycle (Oct 1, 2024)</p>
</div>
<div class="text-left md:text-right">
<h4 class="font-label-sm text-label-sm text-on-surface-variant uppercase mb-1">Estimated New Total</h4>
<p class="font-headline-md text-headline-md text-primary">Pending Input</p>
</div>
</div>
</main>
<!-- BottomNavBar (Transactional Context) -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-3 bg-white dark:bg-gray-900 border-t border-gray-200 dark:border-gray-800 shadow-[0_-4px_12px_rgba(0,0,0,0.04)]">
<button class="flex flex-col items-center justify-center text-gray-500 dark:text-gray-400 px-6 py-2 hover:text-blue-600 dark:hover:text-blue-300 active:scale-95 transition-transform duration-150">
<span class="material-symbols-outlined mb-1" data-icon="close">close</span>
<span class="font-lexend text-xs font-medium">Cancel</span>
</button>
<button class="flex flex-col items-center justify-center bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300 rounded-xl px-6 py-2 hover:text-blue-600 dark:hover:text-blue-300 active:scale-95 transition-transform duration-150">
<span class="material-symbols-outlined mb-1 icon-fill" data-icon="check_circle">check_circle</span>
<span class="font-lexend text-xs font-medium">Confirm Adjustment</span>
</button>
</nav>
