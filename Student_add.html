<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Add New Student - EduAdmin</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;700;800&amp;family=Public+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-variant": "#e1e3e4",
                        "on-secondary": "#ffffff",
                        "tertiary-fixed-dim": "#d2bbff",
                        "on-background": "#191c1d",
                        "on-secondary-fixed": "#002114",
                        "surface-container-high": "#e7e8e9",
                        "inverse-primary": "#b5c4ff",
                        "secondary-container": "#96f6c8",
                        "on-primary-container": "#d4dcff",
                        "error": "#ba1a1a",
                        "on-tertiary-fixed-variant": "#5a00c6",
                        "surface-tint": "#1353d8",
                        "surface-container-highest": "#e1e3e4",
                        "outline-variant": "#c3c5d7",
                        "on-secondary-fixed-variant": "#005137",
                        "surface-container": "#edeeef",
                        "tertiary-container": "#7730eb",
                        "secondary-fixed": "#96f6c8",
                        "inverse-surface": "#2e3132",
                        "background": "#f8f9fa",
                        "on-surface": "#191c1d",
                        "primary": "#003fb1",
                        "on-error": "#ffffff",
                        "surface-bright": "#f8f9fa",
                        "on-error-container": "#93000a",
                        "secondary": "#006c4b",
                        "surface": "#f8f9fa",
                        "surface-dim": "#d9dadb",
                        "on-secondary-container": "#00734f",
                        "on-tertiary-container": "#e6d7ff",
                        "on-surface-variant": "#434654",
                        "primary-fixed": "#dbe1ff",
                        "on-primary-fixed-variant": "#003dab",
                        "primary-container": "#1a56db",
                        "on-primary-fixed": "#00174d",
                        "inverse-on-surface": "#f0f1f2",
                        "tertiary": "#5e00cd",
                        "on-tertiary": "#ffffff",
                        "on-tertiary-fixed": "#25005a",
                        "on-primary": "#ffffff",
                        "error-container": "#ffdad6",
                        "surface-container-lowest": "#ffffff",
                        "secondary-fixed-dim": "#7ad9ad",
                        "primary-fixed-dim": "#b5c4ff",
                        "outline": "#737686",
                        "tertiary-fixed": "#eaddff",
                        "surface-container-low": "#f3f4f5"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "base": "8px",
                        "lg": "40px",
                        "xs": "4px",
                        "sm": "12px",
                        "gutter": "24px",
                        "xl": "64px",
                        "md": "24px",
                        "margin": "32px"
                    },
                    "fontFamily": {
                        "label-md": ["Public Sans"],
                        "headline-md": ["Lexend"],
                        "body-md": ["Public Sans"],
                        "body-sm": ["Public Sans"],
                        "body-lg": ["Public Sans"],
                        "headline-xl": ["Lexend"],
                        "label-sm": ["Public Sans"],
                        "headline-lg": ["Lexend"]
                    },
                    "fontSize": {
                        "label-md": ["12px", { "lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "headline-md": ["20px", { "lineHeight": "1.4", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "body-sm": ["14px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "headline-xl": ["36px", { "lineHeight": "1.2", "fontWeight": "700" }],
                        "label-sm": ["10px", { "lineHeight": "1", "fontWeight": "700" }],
                        "headline-lg": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md text-body-md antialiased">
<!-- TopAppBar Component (from JSON) -->
<header class="bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 docked full-width top-0 z-50">
<div class="flex justify-between items-center w-full px-4 h-16">
<button class="text-blue-700 dark:text-blue-400 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors duration-200 active:opacity-70 p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="text-blue-700 dark:text-blue-400 font-['Lexend'] font-semibold text-lg flex-1 text-center font-bold">Add New Student</h1>
<button class="text-blue-700 dark:text-blue-400 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors duration-200 active:opacity-70 font-label-md text-label-md px-4 py-2 rounded-md">
                Save
            </button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col items-center justify-start p-gutter md:p-margin w-full max-w-3xl mx-auto">
<form class="w-full bg-surface-container-lowest rounded-xl shadow-[0_4px_12px_rgba(0,0,0,0.04)] hover:shadow-[0_4px_12px_rgba(0,0,0,0.08)] transition-shadow duration-300 overflow-hidden border border-outline-variant/30 flex flex-col">
<!-- Photo Upload Section -->
<div class="p-lg flex flex-col items-center justify-center border-b border-outline-variant/30 bg-surface-container-low/50">
<div class="relative group cursor-pointer">
<div class="w-32 h-32 rounded-full bg-surface-variant flex items-center justify-center overflow-hidden border-2 border-dashed border-outline hover:border-primary transition-colors duration-200">
<span class="material-symbols-outlined text-outline text-4xl group-hover:text-primary transition-colors duration-200" style='font-variation-settings: "FILL" 1;'>person</span>
</div>
<div class="absolute bottom-0 right-0 bg-primary text-on-primary w-10 h-10 rounded-full flex items-center justify-center shadow-md shadow-primary/30 border-2 border-surface-container-lowest transform group-hover:scale-110 transition-transform duration-200">
<span class="material-symbols-outlined text-sm">add_a_photo</span>
</div>
</div>
<p class="mt-sm font-label-md text-label-md text-on-surface-variant uppercase tracking-widest">Upload Portrait</p>
</div>
<!-- Form Fields Section -->
<div class="p-lg flex flex-col gap-gutter">
<!-- Full Name -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="fullName">Student Full Name</label>
<input class="w-full bg-[#F3F4F6] border-0 border-b-2 border-outline-variant focus:border-primary focus:ring-0 rounded-t-md px-4 py-3 font-body-md text-body-md text-on-surface transition-colors duration-200" id="fullName" placeholder="Sekh Samim Ali" type="text" value="Sekh Samim Ali"/>
</div>
<!-- Grid for Class and Fees -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-gutter">
<!-- Class Dropdown -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="studentClass">Class</label>
<div class="relative">
<select class="w-full bg-[#F3F4F6] border-0 border-b-2 border-outline-variant focus:border-primary focus:ring-0 rounded-t-md px-4 py-3 font-body-md text-body-md text-on-surface appearance-none transition-colors duration-200 cursor-pointer" id="studentClass">
<option disabled="" value="">Select a class</option>
<option selected="" value="10A">Class 10A</option>
<option value="10B">Class 10B</option>
<option value="11A">Class 11A</option>
<option value="11B">Class 11B</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline pointer-events-none">expand_more</span>
</div>
</div>
<!-- Monthly Fees -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="monthlyFees">Monthly Fees</label>
<div class="relative flex items-center">
<span class="absolute left-4 text-on-surface-variant font-body-md text-body-md">$</span>
<input class="w-full bg-[#F3F4F6] border-0 border-b-2 border-outline-variant focus:border-primary focus:ring-0 rounded-t-md pl-8 pr-4 py-3 font-body-md text-body-md text-on-surface transition-colors duration-200" id="monthlyFees" placeholder="500" type="number" value="500"/>
</div>
</div>
</div>
<!-- Grid for Contact and Date -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-gutter">
<!-- Contact Number -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="contactNumber">Contact Number</label>
<input class="w-full bg-[#F3F4F6] border-0 border-b-2 border-outline-variant focus:border-primary focus:ring-0 rounded-t-md px-4 py-3 font-body-md text-body-md text-on-surface transition-colors duration-200" id="contactNumber" placeholder="+91 9339049348" type="tel" value="+91 9339049348"/>
</div>
<!-- Joining Date -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant flex justify-between items-end" for="joiningDate">
                            Joining Date
                            <span class="font-label-sm text-label-sm text-outline normal-case font-normal">Automatically set to today</span>
</label>
<div class="relative flex items-center">
<input class="w-full bg-[#F3F4F6] border-0 border-b-2 border-outline-variant focus:border-primary focus:ring-0 rounded-t-md px-4 py-3 font-body-md text-body-md text-on-surface transition-colors duration-200 cursor-not-allowed opacity-80" id="joiningDate" readonly="" type="date" value="2023-10-24"/>
<span class="material-symbols-outlined absolute right-4 text-outline pointer-events-none">calendar_today</span>
</div>
</div>
</div>
</div>
<!-- Action Button Section -->
<div class="p-lg bg-surface flex justify-end items-center border-t border-outline-variant/30">
<button class="bg-primary hover:bg-primary-container text-on-primary hover:text-on-primary-container font-label-md text-label-md px-xl py-sm rounded-full shadow-sm hover:shadow-md transition-all duration-200 flex items-center justify-center gap-2" type="submit">
<span class="material-symbols-outlined text-sm">person_add</span>
                    Add Student
                </button>
</div>
</form>
</main>
</body></html>
